<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O'zbekiston Konstitutsiyasi — Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3a6b;
  --blue-light:#e8eef7;
  --green:#1a6b4a;
  --green-light:#e8f5ef;
  --red:#8b1a1a;
  --red-light:#f7e8e8;
  --gold:#b8860b;
  --gray:#f5f5f0;
  --text:#1a1a1a;
  --muted:#666;
  --border:#ddd;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

/* SCREEN: START */
#screen-start{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;
  background:linear-gradient(160deg,#0d2240 0%,#1a3a6b 60%,#2a5298 100%);
  color:#fff;
}
.flag-stripe{display:flex;width:120px;height:10px;border-radius:5px;overflow:hidden;margin:0 auto 2rem}
.flag-stripe div{flex:1}
.flag-blue{background:#009FCA}
.flag-white{background:#fff}
.flag-green{background:#1FB25A}
.start-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);margin-bottom:.5rem;line-height:1.2}
.start-sub{font-size:1rem;opacity:.75;margin-bottom:2.5rem;max-width:420px}
.stat-row{display:flex;gap:2rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:#ffd700}
.stat-label{font-size:.8rem;opacity:.7;text-transform:uppercase;letter-spacing:.05em}
.btn-start{
  padding:1rem 2.5rem;font-size:1.1rem;font-weight:600;
  background:#ffd700;color:#0d2240;border:none;border-radius:50px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  font-family:'Source Sans 3',sans-serif;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.mode-row{display:flex;gap:1rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.mode-btn{
  padding:.6rem 1.4rem;font-size:.9rem;border:1.5px solid rgba(255,255,255,.4);
  background:transparent;color:#fff;border-radius:50px;cursor:pointer;
  font-family:'Source Sans 3',sans-serif;transition:all .15s;
}
.mode-btn.active{background:#fff;color:#0d2240;border-color:#fff}

/* SCREEN: QUIZ */
#screen-quiz{display:none;min-height:100vh;padding:1rem}
.quiz-wrap{max-width:680px;margin:0 auto;padding:1.5rem 0}

.top-bar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem}
.progress-track{flex:1;height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .4s ease}
.qcount{font-size:.85rem;color:var(--muted);white-space:nowrap}
.score-pill{
  background:var(--blue);color:#fff;font-size:.85rem;font-weight:600;
  padding:.3rem .9rem;border-radius:20px;white-space:nowrap;
}

.question-card{
  background:#fff;border-radius:16px;padding:1.75rem;
  box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:1rem;
}
.qnum{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:600;margin-bottom:.6rem}
.qtext{font-size:1.05rem;line-height:1.6;color:var(--text)}

.options{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;background:#fff;transition:border-color .15s,background .15s;
  font-size:.95rem;color:var(--text);line-height:1.5;text-align:left;width:100%;
}
.opt:hover:not(.locked){border-color:#9ab;background:#f8fafc}
.opt-label{
  font-weight:600;color:var(--muted);min-width:22px;font-size:.85rem;
  background:var(--gray);border-radius:5px;padding:2px 6px;
  line-height:1.4;flex-shrink:0;margin-top:1px;
}
.opt.correct{border-color:var(--green);background:var(--green-light)}
.opt.correct .opt-label{background:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:var(--red-light)}
.opt.wrong .opt-label{background:var(--red);color:#fff}
.opt.locked{cursor:default}

.feedback{
  padding:.75rem 1rem;border-radius:8px;font-size:.9rem;
  margin-bottom:1rem;display:none;font-weight:500;
}
.feedback.show{display:block}
.feedback.ok{background:var(--green-light);color:var(--green)}
.feedback.ko{background:var(--red-light);color:var(--red)}

.btn-next{
  width:100%;padding:.9rem;font-size:1rem;font-weight:600;
  background:var(--blue);color:#fff;border:none;border-radius:10px;
  cursor:pointer;display:none;font-family:'Source Sans 3',sans-serif;
  transition:background .15s;
}
.btn-next:hover{background:#254e94}

/* SCREEN: RESULT */
#screen-result{display:none;min-height:100vh;padding:1.5rem;text-align:center}
.result-wrap{max-width:520px;margin:0 auto;padding:2rem 0}
.result-circle{
  width:140px;height:140px;border-radius:50%;
  border:5px solid var(--blue);display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:0 auto 1.5rem;
  background:#fff;box-shadow:0 4px 20px rgba(26,58,107,.15);
}
.result-score{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--blue)}
.result-of{font-size:.85rem;color:var(--muted)}
.result-title{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:.5rem}
.result-sub{color:var(--muted);margin-bottom:2rem}
.result-grade{
  display:inline-block;padding:.5rem 1.5rem;border-radius:50px;
  font-weight:600;font-size:.95rem;margin-bottom:2rem;
}
.wrong-list{text-align:left;background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wrong-list h3{font-size:.9rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem}
.wrong-item{font-size:.85rem;margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid #f0f0f0;line-height:1.5}
.wrong-item:last-child{border:none;margin:0;padding:0}
.wrong-q{color:var(--text);margin-bottom:.2rem}
.wrong-a{color:var(--green);font-weight:500}
.btn-restart{
  padding:.9rem 2.5rem;font-size:1rem;font-weight:600;
  background:var(--blue);color:#fff;border:none;border-radius:50px;
  cursor:pointer;font-family:'Source Sans 3',sans-serif;
  margin-right:.5rem;
}
.btn-restart2{
  padding:.9rem 2rem;font-size:1rem;font-weight:600;
  background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:50px;
  cursor:pointer;font-family:'Source Sans 3',sans-serif;
}

@media(max-width:480px){
  .question-card{padding:1.25rem}
  .opt{font-size:.9rem}
}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="screen-start">
  <div class="flag-stripe"><div class="flag-blue"></div><div class="flag-white"></div><div class="flag-green"></div></div>
  <h1 class="start-title">O'zbekiston Konstitutsiyasi<br>Test Savollari</h1>
  <p class="start-sub">Bilimingizni sinab ko'ring — har safar savollar tasodifiy tanlanadi</p>
  <div class="stat-row">
    <div class="stat"><div class="stat-num">303</div><div class="stat-label">Jami savol</div></div>
    <div class="stat"><div class="stat-num" id="mode-count-display">30</div><div class="stat-label">Har testda</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">Variant</div></div>
  </div>
  <div class="mode-row">
    <button class="mode-btn active" data-count="20">20 ta</button>
    <button class="mode-btn" data-count="30">30 ta</button>
    <button class="mode-btn" data-count="50">50 ta</button>
    <button class="mode-btn" data-count="303">Barchasi</button>
  </div>
  <button class="btn-start" onclick="startQuiz()">Testni Boshlash →</button>
</div>

<!-- QUIZ SCREEN -->
<div id="screen-quiz">
  <div class="quiz-wrap">
    <div class="top-bar">
      <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
      <div class="qcount" id="qcount">1 / 30</div>
      <div class="score-pill">⭐ <span id="sc">0</span></div>
    </div>
    <div class="question-card">
      <div class="qnum" id="qnum">Savol 1</div>
      <div class="qtext" id="qtext"></div>
    </div>
    <div class="options" id="opts"></div>
    <div class="feedback" id="fb"></div>
    <button class="btn-next" id="nxt" onclick="nextQ()">Keyingisi →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result">
  <div class="result-wrap">
    <div class="result-circle">
      <div class="result-score" id="res-score">0</div>
      <div class="result-of" id="res-of">/ 30</div>
    </div>
    <h2 class="result-title" id="res-grade">Natija</h2>
    <p class="result-sub" id="res-pct"></p>
    <div class="wrong-list" id="wrong-list" style="display:none">
      <h3>Xato javoblar</h3>
      <div id="wrong-items"></div>
    </div>
    <button class="btn-restart" onclick="startQuiz()">Qaytadan ↺</button>
    <button class="btn-restart2" onclick="goHome()">Bosh sahifa</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"q": "O‘zbekiston Respublikasi Konstitutsiyasining nechanchi moddasida “Har kim sog'ligini saqlash va malakali tibbiy xizmatdan foydalanish huquqiga ega” ekanligi qayd etilgan?", "answers": ["48-moddasida", "30-moddasida", "4-moddasida", "78-moddasida"], "correct": 0}, {"q": "O‘zbekistonning Mustaqillik Deklaratsiyasi qachon qabul qilindi?", "answers": ["1990-yil 20-iyunda", "1990-yil 18-iyunda", "1991-yil 17-martda", "1991-yil 31-avgust"], "correct": 0}, {"q": "O‘zbekiston Respublikasida Markaziy Saylov komissiyasi qaysi organ tomonidan tuziladi?", "answers": ["Oliy Majlis tomonidan tuziladi.", "Vazirlar Mahkamasi tomonidan tuziladi.", "Prezident tomonidan tuziladi va Senat tomonidan tasdiqlanadi.", "Referendum asosida tuziladi."], "correct": 0}, {"q": "Qаysi mаfkurа O‘zbekistоn Respublikаsidа dаvlаtniki sifаtidа o’rnаtilishi mumkin?", "answers": ["hech qаysi mаfkurа", "diniy mаfkurа", "siyosiy bоshqаrmаlаr mаfkurаsi", "dаvlаt mаfkurаsi"], "correct": 0}, {"q": "O‘zbekiston Respublikasida deputаtlikkа nоmzоd qаysi hоllаrdа sаylаngаn hisоblаnаdi?", "answers": ["sаylоvchilarning 50% dаn bittа оrtiq оvоzini оlsа", "sаylоvchilаrning bаrchаsi оvоz bersа", "mаrkаziy sаylоv kоmissiyasining qаrоrigа ko’rа", "sаylоvdа qаtnаshgаnlаrning 55% оvоzini оlsа"], "correct": 0}, {"q": "O‘zbekistоn Respublikаsida qаysi оrgаn оliy dаvlаt vаkilik оrgаni sifаtidа qоnun chiqаruvchi hоkimiyatni аmаlgа оshirаdi?", "answers": ["O‘zbekistоn Respublikаsi Оliy mаjlisi", "O‘zbekistоn Respublikаsi Vаzirlаr Mаhkаmаsi", "O‘zbekistоn Respublikаsi Оliy sudi", "O‘zbekistоn Respublikаsi Kоnstitusiya sudi"], "correct": 0}, {"q": "Qonun chiqaruvchi, ijro etuvchi va sud hokimiyatining bo’linganligi – bu?", "answers": ["Hokimiyatning bo‘linish prinsipidir", "Odil sudlovni amalga oshirish prinsipidir", "Prokuratura organlari funksiyalari ajratib qo‘yilganligi prinsipidir", "Sud hokimiyati organlari vakolatlarining ajratib qo‘yilganligi prinsipidir"], "correct": 0}, {"q": "O‘zbekiston Respublikasi Konstitutsiyasiga binoan  jamiyat va davlat hayotining eng muhim masalalari ... ?", "answers": ["Referendumga qo‘yiladi", "Mitinglarda ko‘rib chiqiladi", "Saylovlarga qo‘yiladi", "Namoyishlarga qo‘yiladi"], "correct": 0}, {"q": "O`zbekiston Respublikasi parlamentining nomi to`g`ri ko`rsatilgan qatorni aniqlang?", "answers": ["Oliy Majlis", "Oliy Kengash", "Qonunchilik palatasi", "Senat"], "correct": 0}, {"q": "O`zbekiston Respublikasida hokimiyatlar bo`linish prinsipiga asosan vakolatlar qanday taqsimlanadi?", "answers": ["Qonun chiqaruvchi, ijro etuvchi va sud hokimiyatiga bo`linadi", "Qonunchilik palatasi va senat", "Qonun chiqaruvchi va sud hokimiyatiga bo`linadi", "Vazirlar Mahkamasi va sud hokimiyatiga bo`linadi"], "correct": 0}, {"q": "O‘zbekiston Respublikasi Parlament palatalarining birgalikdagi vakolatiga kiradigan masalalar, qoida tariqasida qanday ko‘rib chiqiladi?", "answers": ["Avval O‘zbekiston Respublikasi Oliy Majlisining Qonunchilik palatasida, so‘ngra Senatida ko‘rib chiqiladi", "O‘zbekiston Respublikasi Oliy Majlisining Senati Raisi tomonidan ko‘rib chiqiladi", "Qonunchilik palatasi tomonidan ko‘rib chiqilib, Senat tomonidan maqullanadi va Bosh Vazir imzolaydi", "O‘zbekiston Respublikasi Oliy Majlisining Qonunchilik palatasi deputatlari va Senat azolari umumiy sonining kamida uchdan ikki qismidan iborat tarkibda ko‘rib chiqiladi"], "correct": 0}, {"q": "O‘zbekiston Respublikasida demokratiya qanday prinsiplarga asoslanadi?", "answers": ["Umuminsoniy", "Milliy", "Xalqaro", "Fuqaroviy"], "correct": 0}, {"q": "Hozirda O`zbekistonda faoliyat yuritayotgan partiyalar to`g`ri ko`rsatilgan qatorni toping?", "answers": ["O`zbekiston xalq demokratik partiyasi, Adolat sotsial-demokratik partiyasi, O`zbekiston liberal demokratik partiyasi, Milliy tiklanish demokratik partiyasi,  O‘zbekiston Ekologik partiyasi", "O`zbekiston xalq demokratik partiyasi, “Adolat” sotsial-demokratik partiyasi, Vatan taraqqiyoti partiyasi", "O`zbekiston liberal demokratik partiyasi, “Milliy tiklanish” demokratik partiyasi.", "“Adolat”sotsial-demokratik partiyasi, O`zbekiston liberal demokratik partiyasi, Xalq demokratik partiyasi"], "correct": 0}, {"q": "\"O‘zbekiston Respublikasida O‘zbekiston Respublikasining Konstitutsiyasi va qonunlarining ustunligi so'zsiz tan olinadi...\" Bu konstitutsiyamizning qaysi moddasida mustahkamlangan?", "answers": ["О'zbekiston Respublikasining Konstitutsiyasi, 15-moddasida.", "О 'zbekiston Respublikasining Konstitutsiyasi, 108-moddasida.", "О 'zbekiston Respublikasining Konstitutsiyasi, 21-moddasida.", "О 'zbekiston Respublikasining Konstitutsiyasi, 30-moddasida."], "correct": 0}, {"q": "Inson huquqlari umumjahon deklaratsiyasi qachon qabul qilingan?", "answers": ["1948 yil 10 dekabr;", "1945 yil 24 dekabr;", "1989 yil 20 noyabr;", "1949 yil 15 noyabr;"], "correct": 0}, {"q": "O‘zbekistonda birinchi marta prezidentlik lavozimi qachon joriy qilindi?", "answers": ["1990 yil 24 mart", "1991 yil 24 mart", "1989 yil 24 mart", "1988 yil 24 mart"], "correct": 0}, {"q": "“Xalq davlat hokimiyatning birdan-bir manbaidir” – O‘zbekiston Respublikasi Konstitutsiyasining nechanchi moddasi?", "answers": ["7-modda", "17-modda", "2-modda", "44-modda"], "correct": 0}, {"q": "Konstitutsiyamizda qanday g‘oya markaziy o‘ringa qo‘yilgan?", "answers": ["Inson va uning qadr-qimmati", "Davlat va hokimiyat manfaati", "Hokimiyat manfaatini ta’minlash", "Qonun ustuvorligi va davlat manfaatini ta’minlash"], "correct": 0}, {"q": "O‘zbekistоn Respublikasida Qurоlli kuchlаrining Оliy Bоsh qo’mоndоni vаkоlаti kimgа tegishli?", "answers": ["O‘zbekistоn Prezidentigа", "Mudоfаа vаzirigа", "Vаzirlаr Mаhkаmаsi rаisigа", "Ichki ishlаr vаzirigа"], "correct": 0}, {"q": "O‘zbekistоn Respublikasida Prezident fаrmоnlаri vа qаrоrlаrining ijrоsini tа’minlоvchi оrgаnini аniqlаng?", "answers": ["O‘zbekistоn Respublikаsi Vаzirlаr Mаhkаmаsi", "O‘zbekistоn Respublikаsi Kоnstitutsiyaviy sudi", "O‘zbekistоn Respublikаsi Оliy хo’jаlik sudi", "O‘zbe const LABELS = ['A','B','C','D'];
let questions, cur, score, mode, wrongAnswers, answered;

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const c = parseInt(btn.dataset.count);
    document.getElementById('mode-count-display').textContent = c === 303 ? '303' : c;
  });
});

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function goHome(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-result').style.display='none';
  document.getElementById('screen-start').style.display='flex';
}

function startQuiz(){
  const activeBtn = document.querySelector('.mode-btn.active');
  mode = parseInt(activeBtn.dataset.count);
  questions = shuffle(ALL_QUESTIONS).slice(0, mode);
  cur = 0; score = 0; wrongAnswers = [];
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-result').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  renderQ();
}

function renderQ(){
  const q = questions[cur];
  const pct = (cur / questions.length * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('qcount').textContent = (cur+1) + ' / ' + questions.length;
  document.getElementById('sc').textContent = score;
  document.getElementById('qnum').textContent = 'Savol ' + (cur+1);
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('fb').className = 'feedback';
  document.getElementById('nxt').style.display = 'none';
  answered = false;

  const idxs = shuffle([0,1,2,3]);
  const correctNew = idxs.indexOf(q.correct);

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  idxs.forEach((origIdx, newPos) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = '<span class="opt-label">'+LABELS[newPos]+'</span><span>'+q.answers[origIdx]+'</span>';
    btn.onclick = () => {
      if(answered) return;
      answered = true;
      document.querySelectorAll('.opt').forEach(b => b.classList.add('locked'));
      const fb = document.getElementById('fb');
      if(newPos === correctNew){
        btn.classList.add('correct');
        score++;
        document.getElementById('sc').textContent = score;
        fb.textContent = "✓ To'g'ri javob!";
        fb.className = 'feedback show ok';
      } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.opt')[correctNew].classList.add('correct');
        fb.textContent = "✗ Noto'g'ri. To'g'ri: " + q.answers[q.correct];
        fb.className = 'feedback show ko';
        wrongAnswers.push({q: q.q, correct: q.answers[q.correct]});
      }
      document.getElementById('nxt').style.display = 'block';
    };
    opts.appendChild(btn);
  });
}

function nextQ(){
  cur++;
  if(cur >= questions.length) showResult();
  else renderQ();
}

function showResult(){
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-result').style.display='block';
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-of').textContent = '/ ' + questions.length;
  document.getElementById('res-pct').textContent = pct + '% to\'g\'ri javob';

  let grade, color;
  if(pct>=90){grade='A\'lo! 🏆';color='#1a6b4a';}
  else if(pct>=75){grade='Yaxshi! 👍';color='#1a3a6b';}
  else if(pct>=55){grade='Qoniqarli';color='#b8860b';}
  else{grade='Ko\'proq o\'qing 📚';color='#8b1a1a';}

  document.getElementById('res-grade').textContent = grade;
  document.getElementById('res-grade').style.color = color;

  if(wrongAnswers.length > 0){
    const wl = document.getElementById('wrong-list');
    const wi = document.getElementById('wrong-items');
    wl.style.display = 'block';
    const show = wrongAnswers.slice(0, 10);
    wi.innerHTML = show.map(w =>
      '<div class="wrong-item"><div class="wrong-q">'+w.q+'</div><div class="wrong-a">✓ '+w.correct+'</div></div>'
    ).join('');
    if(wrongAnswers.length > 10){
      wi.innerHTML += '<div style="font-size:.8rem;color:#999;text-align:center;padding-top:.5rem">...va yana '+(wrongAnswers.length-10)+' ta</div>';
    }
  } else {
    document.getElementById('wrong-list').style.display='none';
  }
}
</script>
